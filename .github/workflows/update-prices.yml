name: Update Preisdaten

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download und komprimiere mit gzip
        run: |
          mkdir -p data
          echo "Lade Rohdaten..."
          curl -L --fail --retry 3 --retry-delay 10 \
            -o /tmp/raw.json \
            https://heisse-preise.io/data/latest-canonical.json
          echo "Rohdaten-Groesse:"
          ls -lh /tmp/raw.json
          echo "Komprimiere mit gzip..."
          gzip -9 -c /tmp/raw.json > data/prices.json.gz
          echo "Komprimierte Groesse:"
          ls -lh data/prices.json.gz
          # Alte unkomprimierte Datei entfernen falls vorhanden
          rm -f data/prices.json

      - name: Zeitstempel speichern
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/updated.txt

      - name: Commit und Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -A data/
          if git diff --staged --quiet; then
            echo "Keine Aenderungen"
          else
            git commit -m "Preisdaten aktualisiert $(date -u +%Y-%m-%d)"
            git push
          fi
