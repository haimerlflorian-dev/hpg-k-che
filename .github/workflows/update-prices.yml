name: Update Preisdaten

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download und komprimiere Preisdaten
        run: |
          mkdir -p data
          echo "Lade Rohdaten..."
          curl -L --fail --retry 3 --retry-delay 10 \
            -o /tmp/raw.json \
            https://heisse-preise.io/data/latest-canonical.json
          echo "Rohdaten-Groesse:"
          ls -lh /tmp/raw.json
          echo "Komprimiere (nur aktuelle Preise)..."
          node -e "
            const fs = require('fs');
            const raw = JSON.parse(fs.readFileSync('/tmp/raw.json', 'utf8'));
            const items = Array.isArray(raw) ? raw : (raw.items || raw.data || []);
            const compact = items
              .filter(p => p && p.name && p.store)
              .map(p => ({
                n: p.name,
                s: String(p.store).toLowerCase(),
                p: typeof p.price === 'number' ? p.price : (p.priceHistory && p.priceHistory[0] ? p.priceHistory[0].price : 0),
                u: p.unit || 'stk',
                q: p.quantity || 1,
                b: p.bio ? 1 : 0,
              }))
              .filter(p => p.p > 0);
            fs.writeFileSync('data/prices.json', JSON.stringify(compact));
            console.log('Produkte:', compact.length);
          "
          echo "Komprimierte Groesse:"
          ls -lh data/prices.json

      - name: Zeitstempel speichern
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/updated.txt

      - name: Commit und Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          if git diff --staged --quiet; then
            echo "Keine Aenderungen"
          else
            git commit -m "Preisdaten aktualisiert $(date -u +%Y-%m-%d)"
            git push
          fi
