name: Update Preisdaten

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Preisdaten von heisse-preise.io
        run: |
          mkdir -p data
          curl -L --fail --retry 3 --retry-delay 10 \
            -o data/prices.json \
            https://heisse-preise.io/data/latest-canonical.json
          echo "Dateigröße:"
          ls -lh data/prices.json

      - name: Zeitstempel speichern
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/updated.txt

      - name: Commit und Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Keine Aenderungen"
          else
            git commit -m "Preisdaten aktualisiert $(date -u +%Y-%m-%d)"
            git push
          fi
